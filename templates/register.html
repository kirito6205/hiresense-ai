<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register • HireSense AI</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins',sans-serif;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #111827
            );

            min-height:100vh;

            color:white;

            display:flex;

            align-items:center;

            justify-content:center;

            padding:40px;
        }

        .container{

            width:100%;

            max-width:520px;
        }

        .card{

            background:
            rgba(255,255,255,0.07);

            backdrop-filter:blur(14px);

            border-radius:24px;

            padding:42px;

            border:
            1px solid rgba(
                255,
                255,
                255,
                0.08
            );
        }

        .logo{

            text-align:center;

            margin-bottom:32px;
        }

        .logo h1{

            font-size:34px;

            font-weight:700;
        }

        .logo span{

            color:#3b82f6;
        }

        .logo p{

            margin-top:10px;

            color:#94a3b8;

            font-size:14px;
        }

        .input-group{

            margin-bottom:22px;
        }

        label{

            display:block;

            margin-bottom:10px;

            font-size:14px;

            color:#cbd5e1;
        }

        input, select{

            width:100%;

            padding:16px 18px;

            border-radius:14px;

            border:none;

            outline:none;

            background:
            rgba(255,255,255,0.08);

            color:white;

            font-size:15px;
        }

        select{

            cursor:pointer;
        }

        option{

            background:#111827;
        }

        input::placeholder{

            color:#94a3b8;
        }

        .btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:14px;

            background:#2563eb;

            color:white;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

            transition:0.2s;
        }

        .btn:hover{

            background:#1d4ed8;
        }

        .footer{

            text-align:center;

            margin-top:24px;

            color:#94a3b8;

            font-size:14px;
        }

        .footer a{

            color:#60a5fa;

            text-decoration:none;
        }

        .flash{

            background:
            rgba(239,68,68,0.18);

            color:#fecaca;

            padding:14px;

            border-radius:12px;

            margin-bottom:20px;

            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">

            <h1>
                Hire<span>Sense</span> AI
            </h1>

            <p>
                Create your account
            </p>

        </div>

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                {% for message in messages %}

                    <div class="flash">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <form method="POST">

            <div class="input-group">

                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    placeholder="Enter your name"
                    required
                >

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    placeholder="Create a password"
                    required
                >

            </div>

            <div class="input-group">

                <label>Account Type</label>

                <select
                    name="role"
                    required
                >

                    <option value="candidate">

                        Candidate

                    </option>

                    <option value="recruiter">

                        Recruiter

                    </option>

                </select>

            </div>

            <button
                type="submit"
                class="btn"
            >

                Create Account

            </button>

        </form>

        <div class="footer">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </div>

    </div>

</div>

</body>
</html>
